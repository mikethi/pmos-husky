# Passive build configuration
# Sync file list to import from external repositories.
SYNC_CONFIG="sync-sources.conf"

# Optional command run before each sync/build cycle.
# Example: PRE_SYNC_COMMAND="./mirror-pixel-repos.sh"
PRE_SYNC_COMMAND="./mirror-pixel-repos.sh"

# Poll interval in seconds (900 = 15 minutes).
POLL_SECONDS=900

# Build command to run after sync.
# Example: BUILD_COMMAND="pmbootstrap build linux-google-husky"
BUILD_COMMAND="echo Set BUILD_COMMAND in passive-build.conf"

# If true, only run build when synced material checksum changes.
BUILD_ON_CHANGE_ONLY=true

# If true, run one build immediately on startup.
INITIAL_BUILD=false
